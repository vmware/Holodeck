name: ci
on:
  push:
    branches:
      - main
      - 'release/**'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/cache@v6
        with:
          key: ${{ github.ref }}
          path: .cache
      - run: pip install -r requirements.txt
      - run: git config user.name ci-bot
      - run: git config user.email ci-bot@users.noreply.github.com
      - name: Deploy docs with mike
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            DEPLOY_ARGS="--update-aliases 9.1 latest"
          else
            VERSION=$(echo "$GITHUB_REF_NAME" | sed 's|release/||')
            DEPLOY_ARGS="$VERSION"
          fi

          deployed=false
          for attempt in 1 2 3 4 5; do
            git fetch origin gh-pages && \
              mike deploy --push $DEPLOY_ARGS && \
              deployed=true && break
            echo "Attempt $attempt failed (gh-pages push conflict). Retrying in 30s..."
            sleep 30
          done
          if [ "$deployed" = "false" ]; then
            echo "ERROR: mike deploy failed after 5 attempts" >&2
            exit 1
          fi

          if [ "$GITHUB_REF_NAME" = "main" ]; then
            set_default_done=false
            for attempt in 1 2 3 4 5; do
              git fetch origin gh-pages && \
                mike set-default --push latest && \
                set_default_done=true && break
              echo "set-default attempt $attempt failed. Retrying in 30s..."
              sleep 30
            done
            if [ "$set_default_done" = "false" ]; then
              echo "ERROR: mike set-default failed after 5 attempts" >&2
              exit 1
            fi
          fi
