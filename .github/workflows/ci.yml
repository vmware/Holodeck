name: ci
on:
  push:
    branches:
      - main
      - 'release/**'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/cache@v6
        with:
          key: ${{ github.ref }}
          path: .cache
      - run: pip install -r requirements.txt
      - run: git config user.name ci-bot
      - run: git config user.email ci-bot@users.noreply.github.com
      - name: Deploy docs with mike
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            DEPLOY_ARGS="--update-aliases 9.1 latest"
          else
            VERSION=$(echo "$GITHUB_REF_NAME" | sed 's|release/||')
            DEPLOY_ARGS="$VERSION"
          fi
          for attempt in 1 2 3 4 5; do
            mike deploy --push $DEPLOY_ARGS && break
            echo "Attempt $attempt failed (gh-pages push conflict). Retrying in 20s..."
            sleep 20
          done
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            for attempt in 1 2 3 4 5; do
              mike set-default --push latest && break
              echo "set-default attempt $attempt failed. Retrying in 20s..."
              sleep 20
            done
          fi
